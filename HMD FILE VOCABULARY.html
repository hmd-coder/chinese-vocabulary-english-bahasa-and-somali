<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>汉语词汇 — Putonghua Vocabulary Master</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e0c;--card:#1a1814;--surface:#23211c;--border:#2e2b25;
  --ink:#e8e0d4;--sand4:#a89a86;--sand5:#7d7264;
  --accent:#d4a574;--accent2:#e8c98e;--green:#4ade80;--yellow:#fbbf24;--red:#ef4444;--purple:#a78bfa;
  --serif:"Songti SC","STSong","SimSun",Georgia,serif;
  --sans:-apple-system,"Segoe UI",system-ui,sans-serif;
  --mono:"SF Mono","Cascadia Code","Fira Code",Consolas,monospace;
}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);overflow:hidden}
#app{max-width:540px;margin:0 auto;height:100%;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}
input{font-family:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .35s ease}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}

/* Header */
.header{padding:16px 18px 12px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#1a1814,var(--bg))}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.header h1{font-size:19px;font-family:var(--serif);font-weight:700;letter-spacing:1px}
.header h1 span{color:var(--accent)}
.header .sub{font-size:11px;color:var(--sand5);margin-top:2px}
.day-badge{text-align:right}
.day-badge .num{font-size:22px;font-weight:700;color:var(--accent);font-family:var(--mono)}
.day-badge .label{font-size:10px;color:var(--sand5)}
.stat-row{display:flex;gap:7px}
.stat-box{flex:1;background:var(--surface);border-radius:9px;padding:7px 10px;text-align:center}
.stat-box .val{font-size:16px;font-weight:700;font-family:var(--mono)}
.stat-box .lbl{font-size:9px;color:var(--sand5);margin-top:1px}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;background:var(--bg)}
.tab-btn{flex:1;padding:10px 6px;border:none;background:transparent;color:var(--sand5);font-size:11px;font-weight:600;border-bottom:2px solid transparent;transition:all .2s}
.tab-btn.active{background:var(--surface);color:var(--ink);border-bottom-color:var(--accent)}
.tab-btn .icon{font-size:15px;display:block;margin-bottom:1px}

/* Content */
.content{flex:1;overflow-y:auto;padding:14px 16px 80px}

/* Cards */
.word-card{background:var(--card);border-radius:13px;border:1px solid var(--border);margin-bottom:9px;overflow:hidden;transition:border-color .3s}
.word-card.studied{border-color:rgba(251,191,36,.25)}
.word-card.mastered{border-color:rgba(74,222,128,.3)}
.card-head{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none}
.card-num{font-size:10px;color:var(--sand5);font-family:var(--mono);min-width:42px;text-align:right}
.card-word{font-size:24px;font-weight:600;font-family:var(--serif);letter-spacing:2px}
.card-pinyin{margin-left:10px;font-size:14px;color:var(--accent);font-family:var(--mono)}
.card-table{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600}
.card-table.t1{background:rgba(212,165,116,.15);color:var(--accent)}
.card-table.t2{background:rgba(167,139,250,.15);color:var(--purple)}
.card-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.card-arrow{font-size:16px;transition:transform .2s;color:var(--sand5)}
.card-arrow.open{transform:rotate(180deg)}

/* Expanded card */
.card-body{padding:0 16px 16px;border-top:1px solid var(--border)}
.trans-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.trans-box{background:var(--surface);border-radius:9px;padding:9px 11px}
.trans-box .flag{font-size:10px;color:var(--sand5);margin-bottom:3px}
.trans-box .val{font-size:13px;color:var(--ink);font-weight:500}
.grammar-box{background:rgba(212,165,116,.08);border-radius:9px;padding:12px;margin-bottom:10px;border-left:3px solid var(--accent)}
.grammar-box .title{font-size:11px;color:var(--accent);font-weight:600;margin-bottom:5px}
.grammar-box .text{font-size:12px;color:var(--ink);line-height:1.6}
.example{background:var(--surface);border-radius:9px;padding:10px 12px;margin-bottom:7px}
.example .cn{font-size:15px;font-family:var(--serif);margin-bottom:2px}
.example .py{font-size:11px;color:var(--accent);font-family:var(--mono);margin-bottom:3px}
.example .en{font-size:12px;color:var(--sand4)}
.tip{font-size:12px;color:var(--sand4);font-style:italic;padding:4px 0;margin-top:4px}
.card-actions{display:flex;gap:7px;margin-top:12px}
.card-actions button{flex:1;padding:9px;border-radius:8px;border:none;font-size:12px;font-weight:600}
.btn-studied{background:var(--surface);color:var(--sand5)}
.btn-studied.on{background:rgba(251,191,36,.15);color:var(--yellow)}
.btn-mastered{background:var(--surface);color:var(--sand5)}
.btn-mastered.on{background:rgba(74,222,128,.15);color:var(--green)}
.loading-spin{display:inline-block;width:18px;height:18px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}

/* Day nav */
.day-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.day-nav h2{font-size:15px;font-family:var(--serif)}
.day-nav .sub{font-size:11px;color:var(--sand5);margin-top:3px}
.nav-btns{display:flex;gap:5px}
.nav-btn{background:var(--surface);border:1px solid var(--border);color:var(--sand4);border-radius:7px;padding:5px 11px;font-size:13px;font-weight:600}
.progress-bar{background:var(--surface);border-radius:5px;height:5px;margin-bottom:16px;overflow:hidden}
.progress-bar .fill{height:100%;border-radius:5px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .5s ease}

/* Quiz */
.quiz-option{width:100%;text-align:left;padding:18px;margin-bottom:10px;background:var(--card);border:1px solid var(--border);border-radius:13px;display:flex;align-items:center;gap:14px}
.quiz-option .qicon{font-size:28px}
.quiz-option .qtitle{font-size:15px;font-weight:600}
.quiz-option .qdesc{font-size:11px;color:var(--sand5);margin-top:2px}
.quiz-card{background:var(--card);border-radius:18px;border:1px solid var(--border);min-height:260px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;text-align:center;cursor:pointer;margin-bottom:14px}
.quiz-card .big{font-size:56px;font-family:var(--serif);letter-spacing:4px;margin-bottom:8px}
.quiz-card .mid{font-size:18px;color:var(--accent);font-family:var(--mono)}
.quiz-card .hint{font-size:12px;color:var(--sand5);margin-top:18px}
.quiz-btns{display:flex;gap:8px}
.quiz-btns button{flex:1;padding:13px;border-radius:11px;border:none;font-size:13px;font-weight:600}
.qb-again{background:rgba(239,68,68,.12);color:var(--red)}
.qb-good{background:rgba(251,191,36,.12);color:var(--yellow)}
.qb-easy{background:rgba(74,222,128,.12);color:var(--green)}

/* Search */
.search-input{width:100%;padding:11px 15px;border-radius:11px;background:var(--surface);border:1px solid var(--border);color:var(--ink);font-size:13px;margin-bottom:6px}
.search-input:focus{outline:none;border-color:var(--accent)}
.search-info{font-size:10px;color:var(--sand5);margin-bottom:12px}
.filter-row{display:flex;gap:6px;margin-bottom:12px}
.filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--sand5);font-size:11px;font-weight:600;transition:all .2s}
.filter-btn.active{background:var(--accent);color:#1a1410;border-color:var(--accent)}

/* Stats */
.ring-row{display:flex;justify-content:center;gap:28px;margin-bottom:26px}
.ring-wrap{text-align:center;position:relative}
.ring-label{font-size:11px;color:var(--sand5);margin-top:6px}
.ring-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.ring-pct{font-size:18px;font-weight:700;font-family:var(--mono)}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:11px;padding:14px;margin-bottom:8px}
.stat-card .st-label{font-size:10px;color:var(--sand5);margin-bottom:5px}
.stat-card .st-val{font-size:20px;font-weight:700;font-family:var(--mono)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px}
.milestone{margin-bottom:11px}
.milestone .m-row{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px}
.milestone .m-name{color:var(--sand4)}
.milestone .m-name.done{color:var(--green)}
.milestone .m-count{color:var(--sand5);font-family:var(--mono)}
.milestone .m-bar{background:var(--surface);border-radius:3px;height:3px;overflow:hidden}
.milestone .m-fill{height:100%;border-radius:3px;transition:width .5s}
.section-title{font-size:14px;color:var(--accent);font-weight:600;margin-bottom:12px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;margin-bottom:16px}
.info-card p{font-size:12px;color:var(--sand4);line-height:1.7;margin-top:7px}
.info-card strong{color:var(--ink)}
.info-card .highlight{color:var(--accent)}
.reset-btn{width:100%;padding:12px;border-radius:11px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red);font-size:12px;font-weight:600;margin-top:10px}

/* Settings */
.settings-group{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:16px;margin-bottom:14px}
.settings-group label{display:block;font-size:12px;color:var(--sand4);margin-bottom:6px}
.settings-group input[type=text],.settings-group input[type=number],.settings-group select{width:100%;padding:10px 14px;border-radius:9px;background:var(--surface);border:1px solid var(--border);color:var(--ink);font-size:13px;font-family:var(--mono)}
.settings-group input:focus,.settings-group select:focus{outline:none;border-color:var(--accent)}
.save-btn{width:100%;padding:12px;border-radius:11px;background:var(--accent);border:none;color:#1a1410;font-size:13px;font-weight:700;margin-top:6px}
.api-status{font-size:11px;margin-top:6px;padding:6px 10px;border-radius:7px}
.api-ok{background:rgba(74,222,128,.1);color:var(--green)}
.api-no{background:rgba(239,68,68,.1);color:var(--red)}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-top">
      <div>
        <h1><span>汉</span>语词汇 Master</h1>
        <div class="sub">Putonghua Vocabulary · <span id="totalWords">0</span> words · 6-Month Plan</div>
      </div>
      <div class="day-badge">
        <div class="num" id="dayNum">1</div>
        <div class="label" id="daysLeft">180 days left</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="val" style="color:var(--yellow)" id="statStudied">0</div><div class="lbl">Studied</div></div>
      <div class="stat-box"><div class="val" style="color:var(--green)" id="statMastered">0</div><div class="lbl">Mastered</div></div>
      <div class="stat-box"><div class="val" style="color:var(--accent)" id="statToday">0/0</div><div class="lbl">Today</div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="study"><span class="icon">📖</span>Study</button>
    <button class="tab-btn" data-tab="quiz"><span class="icon">🎯</span>Quiz</button>
    <button class="tab-btn" data-tab="library"><span class="icon">📚</span>Words</button>
    <button class="tab-btn" data-tab="stats"><span class="icon">📊</span>Stats</button>
    <button class="tab-btn" data-tab="settings"><span class="icon">⚙️</span>Setup</button>
  </div>

  <div class="content" id="content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
//  DATA — Will be loaded below
// ═══════════════════════════════════════════════════
let ALL_WORDS = [];
let TABLE1_COUNT = 0;
const CACHE = {};

function parseData(raw) {
  const [t1, t2] = raw.split('§');
  const parse = (str, tbl) => str.split('|').map((e, i) => {
    const [w, p] = e.split(',', 2);
    return { word: w, pinyin: p, table: tbl };
  });
  const words1 = parse(t1, 1);
  const words2 = parse(t2, 2);
  TABLE1_COUNT = words1.length;
  return [...words1, ...words2];
}

// ═══════════════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════════════
const LS = {
  get(k) { try { return JSON.parse(localStorage.getItem(k)); } catch { return null; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { console.warn(e); } }
};

function getProgress() {
  return LS.get('pht-progress') || { studied: {}, mastered: {}, startDate: today(), wordsPerDay: 94 };
}
function saveProgress(p) { LS.set('pht-progress', p); updateHeader(); }
function getSettings() { return LS.get('pht-settings') || { apiKey: '', wordsPerDay: 94 }; }
function saveSettings(s) { LS.set('pht-settings', s); }
function getCachedTranslation(idx) { return LS.get('pht-t-' + idx); }
function setCachedTranslation(idx, data) { LS.set('pht-t-' + idx, data); }

function today() { return new Date().toISOString().split('T')[0]; }
function daysBetween(a, b) { return Math.floor((new Date(b) - new Date(a)) / 86400000); }

// ═══════════════════════════════════════════════════
//  AI TRANSLATION (Gemini API - free)
// ═══════════════════════════════════════════════════
async function translateWord(word, pinyin, idx) {
  const cached = getCachedTranslation(idx);
  if (cached) return cached;

  const settings = getSettings();
  if (!settings.apiKey) return null;

  try {
    const prompt = `You are a multilingual Chinese language teacher helping a Somali-speaking student learn Chinese. The student also studies Bahasa Indonesia and English. For the Chinese word "${word}" (${pinyin}), give a FULL explanation the student can deeply understand in BOTH English and Somali.

Respond ONLY in JSON, no markdown, no backticks:
{"en":"Full English meaning — explain clearly what this word means, when to use it, with simple language","so":"Somali sharaxaad buuxda — ku sharax erayga si faahfaahsan oo fudud af Soomaali ah, macnaha iyo sida loo isticmaalo","id":"Bahasa Indonesia translation","cn_explain":"用简单中文解释这个词的意思","type":"word type (noun/verb/adjective/adverb/etc)","grammar_en":"English grammar explanation: What type of word is this? How do you use it in a Chinese sentence? What patterns or rules should the student know? Give 2-3 clear sentences.","grammar_so":"Somali grammar sharaxaad: Nooca erayga, sida loogu isticmaalo jumlad Shiinees ah, iyo xeerarka muhiimka ah. 2-3 jumlad oo cad.","ex1cn":"Example sentence 1 in Chinese characters","ex1py":"Pinyin for example 1","ex1en":"English translation of example 1","ex1so":"Somali translation of example 1","ex2cn":"Example sentence 2 in Chinese characters","ex2py":"Pinyin for example 2","ex2en":"English translation of example 2","ex2so":"Somali translation of example 2","tip_en":"Helpful memory tip or cultural note in English","tip_so":"Talo waxtar leh oo ku saabsan xusuusinta ama dhaqanka - af Soomaali"}`;

    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${settings.apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
    });
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);
    setCachedTranslation(idx, parsed);
    return parsed;
  } catch (e) {
    console.error('Translation error:', e);
    return null;
  }
}

// ═══════════════════════════════════════════════════
//  HEADER & TABS
// ═══════════════════════════════════════════════════
let currentTab = 'study';
let viewDayOffset = 0;

function getStudyDay() {
  const p = getProgress();
  return Math.max(0, daysBetween(p.startDate, today()));
}
function getViewDay() { return Math.max(0, getStudyDay() + viewDayOffset); }
function getWordsPerDay() { return getProgress().wordsPerDay || 94; }
function getTotalDays() { return Math.ceil(ALL_WORDS.length / getWordsPerDay()); }

function getDayWords(day) {
  const wpd = getWordsPerDay();
  const start = day * wpd;
  return ALL_WORDS.slice(start, start + wpd).map((w, i) => ({ ...w, idx: start + i }));
}

function updateHeader() {
  const p = getProgress();
  const studied = Object.keys(p.studied).length;
  const mastered = Object.keys(p.mastered).length;
  const vd = getViewDay();
  const words = getDayWords(vd);
  const todayDone = words.filter(w => p.studied[w.idx] || p.mastered[w.idx]).length;

  document.getElementById('totalWords').textContent = ALL_WORDS.length.toLocaleString();
  document.getElementById('dayNum').textContent = 'Day ' + (vd + 1);
  document.getElementById('daysLeft').textContent = Math.max(0, getTotalDays() - getStudyDay()) + ' days left';
  document.getElementById('statStudied').textContent = studied.toLocaleString();
  document.getElementById('statMastered').textContent = mastered.toLocaleString();
  document.getElementById('statToday').textContent = todayDone + '/' + words.length;
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTab = btn.dataset.tab;
    viewDayOffset = 0;
    renderTab();
  });
});

function renderTab() {
  const el = document.getElementById('content');
  el.scrollTop = 0;
  switch (currentTab) {
    case 'study': renderStudy(el); break;
    case 'quiz': renderQuiz(el); break;
    case 'library': renderLibrary(el); break;
    case 'stats': renderStats(el); break;
    case 'settings': renderSettings(el); break;
  }
  updateHeader();
}

// ═══════════════════════════════════════════════════
//  WORD CARD RENDERER
// ═══════════════════════════════════════════════════
function renderWordCard(w, container) {
  const p = getProgress();
  const isStudied = !!p.studied[w.idx];
  const isMastered = !!p.mastered[w.idx];
  const cls = isMastered ? 'mastered' : isStudied ? 'studied' : '';

  const card = document.createElement('div');
  card.className = 'word-card ' + cls;
  card.innerHTML = `
    <div class="card-head">
      <span class="card-num">#${w.idx + 1}</span>
      <div style="flex:1">
        <span class="card-word">${w.word}</span>
        <span class="card-pinyin">${w.pinyin}</span>
      </div>
      <span class="card-table ${w.table === 1 ? 't1' : 't2'}">T${w.table}</span>
      <div class="card-dot" style="background:${isMastered ? 'var(--green)' : isStudied ? 'var(--yellow)' : 'var(--sand5)'}"></div>
      <span class="card-arrow">▾</span>
    </div>`;

  let expanded = false;
  card.querySelector('.card-head').addEventListener('click', async () => {
    expanded = !expanded;
    card.querySelector('.card-arrow').classList.toggle('open', expanded);
    const existing = card.querySelector('.card-body');
    if (!expanded) { if (existing) existing.remove(); return; }
    if (existing) return;

    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = '<div style="text-align:center;padding:16px 0"><div class="loading-spin"></div><p style="font-size:12px;color:var(--sand5);margin-top:8px">Translating with AI...</p></div>';
    card.appendChild(body);

    const trans = await translateWord(w.word, w.pinyin, w.idx);
    if (trans) {
      body.innerHTML = `
        <div style="margin:12px 0 10px">
          <div style="background:var(--surface);border-radius:10px;padding:12px;margin-bottom:8px">
            <div style="font-size:10px;color:var(--sand5);margin-bottom:5px">🇬🇧 <strong style="color:var(--sand4)">English Meaning</strong></div>
            <div style="font-size:13px;color:var(--ink);line-height:1.6">${trans.en || '-'}</div>
          </div>
          <div style="background:rgba(74,222,128,.06);border-radius:10px;padding:12px;margin-bottom:8px;border:1px solid rgba(74,222,128,.12)">
            <div style="font-size:10px;color:var(--green);margin-bottom:5px">🇸🇴 <strong>Af Soomaali</strong></div>
            <div style="font-size:13px;color:var(--ink);line-height:1.6">${trans.so || '-'}</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">
            <div class="trans-box"><div class="flag">🇮🇩 Bahasa</div><div class="val">${trans.id || '-'}</div></div>
            <div class="trans-box"><div class="flag">🇨🇳 中文解释</div><div class="val">${trans.cn_explain || '-'}</div></div>
          </div>
          <div class="trans-box" style="margin-bottom:8px"><div class="flag">📝 Word Type</div><div class="val">${trans.type || '-'}</div></div>
        </div>
        ${trans.grammar_en ? `<div class="grammar-box" style="margin-bottom:8px"><div class="title">📖 Grammar (English)</div><div class="text">${trans.grammar_en}</div></div>` : ''}
        ${trans.grammar_so ? `<div class="grammar-box" style="border-left-color:var(--green);background:rgba(74,222,128,.05);margin-bottom:10px"><div class="title" style="color:var(--green)">📖 Naxwaha (Soomaali)</div><div class="text">${trans.grammar_so}</div></div>` : ''}
        ${trans.ex1cn ? `<div class="example">
          <div class="cn">${trans.ex1cn}</div>
          <div class="py">${trans.ex1py || ''}</div>
          <div class="en">🇬🇧 ${trans.ex1en || ''}</div>
          ${trans.ex1so ? `<div style="font-size:12px;color:var(--green);margin-top:3px">🇸🇴 ${trans.ex1so}</div>` : ''}
        </div>` : ''}
        ${trans.ex2cn ? `<div class="example">
          <div class="cn">${trans.ex2cn}</div>
          <div class="py">${trans.ex2py || ''}</div>
          <div class="en">🇬🇧 ${trans.ex2en || ''}</div>
          ${trans.ex2so ? `<div style="font-size:12px;color:var(--green);margin-top:3px">🇸🇴 ${trans.ex2so}</div>` : ''}
        </div>` : ''}
        ${trans.tip_en ? `<div class="tip">💡 ${trans.tip_en}</div>` : ''}
        ${trans.tip_so ? `<div class="tip" style="color:var(--green)">💡 ${trans.tip_so}</div>` : ''}
        <div class="card-actions">
          <button class="btn-studied ${isStudied ? 'on' : ''}" data-action="study">${isStudied ? '✓ Studied' : 'Mark Studied'}</button>
          <button class="btn-mastered ${isMastered ? 'on' : ''}" data-action="master">${isMastered ? '★ Mastered' : 'Mark Mastered'}</button>
        </div>`;
    } else {
      const settings = getSettings();
      body.innerHTML = settings.apiKey
        ? '<p style="text-align:center;padding:14px;font-size:12px;color:var(--red)">Translation failed. Check your API key in Settings.</p>'
        : '<p style="text-align:center;padding:14px;font-size:12px;color:var(--sand5)">Set up your free Gemini API key in the ⚙️ Setup tab to get AI translations!</p>';
      body.innerHTML += `<div class="card-actions">
        <button class="btn-studied ${isStudied ? 'on' : ''}" data-action="study">${isStudied ? '✓ Studied' : 'Mark Studied'}</button>
        <button class="btn-mastered ${isMastered ? 'on' : ''}" data-action="master">${isMastered ? '★ Mastered' : 'Mark Mastered'}</button>
      </div>`;
    }

    body.querySelectorAll('.card-actions button').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const prog = getProgress();
        if (btn.dataset.action === 'study') {
          if (prog.studied[w.idx]) delete prog.studied[w.idx]; else prog.studied[w.idx] = 1;
        } else {
          if (prog.mastered[w.idx]) delete prog.mastered[w.idx]; else prog.mastered[w.idx] = 1;
        }
        saveProgress(prog);
        // Re-render card status
        const isS = !!prog.studied[w.idx], isM = !!prog.mastered[w.idx];
        card.className = 'word-card ' + (isM ? 'mastered' : isS ? 'studied' : '');
        card.querySelector('.card-dot').style.background = isM ? 'var(--green)' : isS ? 'var(--yellow)' : 'var(--sand5)';
        const studyBtn = body.querySelector('[data-action=study]');
        const masterBtn = body.querySelector('[data-action=master]');
        studyBtn.className = 'btn-studied ' + (isS ? 'on' : '');
        studyBtn.textContent = isS ? '✓ Studied' : 'Mark Studied';
        masterBtn.className = 'btn-mastered ' + (isM ? 'on' : '');
        masterBtn.textContent = isM ? '★ Mastered' : 'Mark Mastered';
      });
    });
  });
  container.appendChild(card);
}

function renderStudy(el) {
  const vd = getViewDay();
  const words = getDayWords(vd);
  const p = getProgress();
  const todayDone = words.filter(w => p.studied[w.idx] || p.mastered[w.idx]).length;
  const pct = words.length ? (todayDone / words.length * 100) : 0;
  const wpd = getWordsPerDay();

  el.innerHTML = `<div class="fade-up">
    <div class="day-nav">
      <div>
        <h2>Day ${vd + 1} — Words ${vd * wpd + 1}–${Math.min((vd + 1) * wpd, ALL_WORDS.length)}</h2>
        <div class="sub">Tap any word for translations & grammar</div>
      </div>
      <div class="nav-btns">
        <button class="nav-btn" id="prevDay">◂</button>
        <button class="nav-btn" id="todayBtn" style="font-size:10px;padding:5px 9px">Today</button>
        <button class="nav-btn" id="nextDay">▸</button>
      </div>
    </div>
    <div class="progress-bar"><div class="fill" style="width:${pct}%"></div></div>
    <div id="wordList"></div>
  </div>`;

  const list = el.querySelector('#wordList');
  words.forEach(w => renderWordCard(w, list));

  el.querySelector('#prevDay').onclick = () => { if (vd > 0) { viewDayOffset--; renderStudy(el); } };
  el.querySelector('#nextDay').onclick = () => { if (vd < getTotalDays() - 1) { viewDayOffset++; renderStudy(el); } };
  el.querySelector('#todayBtn').onclick = () => { viewDayOffset = 0; renderStudy(el); };
}

// ═══════════════════════════════════════════════════
let quizWords = [], quizIdx = 0;

function renderQuiz(el) {
  const p = getProgress();
  const reviewCount = Object.keys(p.studied).filter(k => !p.mastered[k]).length;

  el.innerHTML = `<div class="fade-up" style="max-width:420px;margin:0 auto">
    <h2 style="font-size:17px;font-family:var(--serif);text-align:center;margin-bottom:20px">Choose Quiz Mode</h2>
    <button class="quiz-option" data-mode="today"><span class="qicon">📖</span><div><div class="qtitle" style="color:var(--accent)">Today's Words</div><div class="qdesc">${getDayWords(getViewDay()).length} words from Day ${getViewDay() + 1}</div></div></button>
    <button class="quiz-option" data-mode="review"><span class="qicon">🔄</span><div><div class="qtitle" style="color:var(--yellow)">Review Studied</div><div class="qdesc">${reviewCount} words need review</div></div></button>
    <button class="quiz-option" data-mode="random"><span class="qicon">🎲</span><div><div class="qtitle" style="color:var(--purple)">Random 50</div><div class="qdesc">Random unmastered words</div></div></button>
    <button class="quiz-option" data-mode="t1"><span class="qicon">📗</span><div><div class="qtitle" style="color:var(--accent)">Table 1 Only</div><div class="qdesc">Core vocabulary (${TABLE1_COUNT} words)</div></div></button>
    <button class="quiz-option" data-mode="t2"><span class="qicon">📘</span><div><div class="qtitle" style="color:var(--purple)">Table 2 Only</div><div class="qdesc">Extended vocabulary (${ALL_WORDS.length - TABLE1_COUNT} words)</div></div></button>
  </div>`;

  el.querySelectorAll('.quiz-option').forEach(btn => {
    btn.addEventListener('click', () => startQuiz(btn.dataset.mode));
  });
}

function startQuiz(mode) {
  const p = getProgress();
  let words = [];
  if (mode === 'today') words = getDayWords(getViewDay());
  else if (mode === 'review') words = ALL_WORDS.map((w, i) => ({ ...w, idx: i })).filter(w => p.studied[w.idx] && !p.mastered[w.idx]);
  else if (mode === 't1') words = ALL_WORDS.slice(0, TABLE1_COUNT).map((w, i) => ({ ...w, idx: i })).filter(w => !p.mastered[w.idx]).slice(0, 50);
  else if (mode === 't2') words = ALL_WORDS.slice(TABLE1_COUNT).map((w, i) => ({ ...w, idx: TABLE1_COUNT + i })).filter(w => !p.mastered[w.idx]).slice(0, 50);
  else words = ALL_WORDS.map((w, i) => ({ ...w, idx: i })).filter(w => !p.mastered[w.idx]).slice(0, 50);

  // Shuffle
  for (let i = words.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [words[i], words[j]] = [words[j], words[i]];
  }
  quizWords = words;
  quizIdx = 0;
  renderQuizCard();
}

function renderQuizCard() {
  const el = document.getElementById('content');
  if (quizIdx >= quizWords.length) {
    el.innerHTML = `<div class="fade-up" style="text-align:center;padding:40px 20px">
      <div style="font-size:48px;margin-bottom:16px">🎉</div>
      <h2 style="font-size:20px;font-family:var(--serif);margin-bottom:8px">Quiz Complete!</h2>
      <p style="font-size:13px;color:var(--sand5);margin-bottom:20px">You reviewed ${quizWords.length} words</p>
      <button class="nav-btn" onclick="currentTab='quiz';renderTab()" style="padding:10px 24px">Back to Quiz</button>
    </div>`;
    return;
  }

  const w = quizWords[quizIdx];
  let flipped = false;

  el.innerHTML = `<div class="fade-up" style="max-width:420px;margin:0 auto">
    <div style="text-align:center;margin-bottom:16px">
      <span style="font-size:12px;color:var(--sand5);font-family:var(--mono)">${quizIdx + 1} / ${quizWords.length}</span>
      <div class="progress-bar" style="margin-top:6px"><div class="fill" style="width:${(quizIdx + 1) / quizWords.length * 100}%"></div></div>
    </div>
    <div class="quiz-card" id="qcard">
      <div class="big">${w.word}</div>
      <div class="mid">${w.pinyin}</div>
      <span class="card-table ${w.table === 1 ? 't1' : 't2'}" style="margin-top:10px">Table ${w.table}</span>
      <div class="hint">Tap to reveal meaning</div>
      <div id="qanswer" style="display:none;width:100%;margin-top:16px;text-align:left"></div>
    </div>
    <div class="quiz-btns" id="qbtns" style="display:none">
      <button class="qb-again" data-r="again">Need Review</button>
      <button class="qb-good" data-r="good">Good</button>
      <button class="qb-easy" data-r="easy">Mastered!</button>
    </div>
    <div style="text-align:center;margin-top:14px"><button class="nav-btn" style="font-size:11px" onclick="currentTab='quiz';renderTab()">Exit Quiz</button></div>
  </div>`;

  document.getElementById('qcard').addEventListener('click', async () => {
    if (flipped) return;
    flipped = true;
    document.querySelector('.hint').style.display = 'none';
    const ans = document.getElementById('qanswer');
    ans.style.display = 'block';
    ans.innerHTML = '<div style="text-align:center"><div class="loading-spin"></div></div>';

    const trans = await translateWord(w.word, w.pinyin, w.idx);
    if (trans) {
      ans.innerHTML = `
        <div style="background:var(--surface);border-radius:8px;padding:10px;margin-bottom:6px">
          <div style="font-size:10px;color:var(--sand5);margin-bottom:3px">🇬🇧 English</div>
          <div style="font-size:12px;color:var(--ink);line-height:1.5">${trans.en || '-'}</div>
        </div>
        <div style="background:rgba(74,222,128,.06);border-radius:8px;padding:10px;margin-bottom:6px;border:1px solid rgba(74,222,128,.1)">
          <div style="font-size:10px;color:var(--green);margin-bottom:3px">🇸🇴 Soomaali</div>
          <div style="font-size:12px;color:var(--ink);line-height:1.5">${trans.so || '-'}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px">
          <div class="trans-box"><div class="flag">🇮🇩 Bahasa</div><div class="val" style="font-size:11px">${trans.id || '-'}</div></div>
          <div class="trans-box"><div class="flag">📝 Type</div><div class="val" style="font-size:11px">${trans.type || '-'}</div></div>
        </div>
        ${trans.grammar_en ? `<div style="font-size:11px;color:var(--sand4);line-height:1.5;margin-bottom:4px">📖 ${trans.grammar_en}</div>` : ''}
        ${trans.grammar_so ? `<div style="font-size:11px;color:var(--green);line-height:1.5">📖 ${trans.grammar_so}</div>` : ''}`;
    } else {
      ans.innerHTML = '<div style="font-size:12px;color:var(--sand5);text-align:center">Set up API key in ⚙️ Setup tab</div>';
    }
    document.getElementById('qbtns').style.display = 'flex';
  });

  document.querySelectorAll('#qbtns button').forEach(btn => {
    btn.addEventListener('click', () => {
      const r = btn.dataset.r;
      const p = getProgress();
      if (r === 'easy') { p.mastered[w.idx] = 1; p.studied[w.idx] = 1; }
      else if (r === 'good') { p.studied[w.idx] = 1; }
      saveProgress(p);
      quizIdx++;
      renderQuizCard();
    });
  });
}

// ═══════════════════════════════════════════════════
let libFilter = 'all';

function renderLibrary(el) {
  el.innerHTML = `<div class="fade-up">
    <input class="search-input" id="libSearch" placeholder="Search word or pinyin..." />
    <div class="search-info" id="libInfo">Showing first 80 of ${ALL_WORDS.length} words</div>
    <div class="filter-row">
      <button class="filter-btn ${libFilter==='all'?'active':''}" data-f="all">All</button>
      <button class="filter-btn ${libFilter==='t1'?'active':''}" data-f="t1">Table 1</button>
      <button class="filter-btn ${libFilter==='t2'?'active':''}" data-f="t2">Table 2</button>
      <button class="filter-btn ${libFilter==='new'?'active':''}" data-f="new">New</button>
      <button class="filter-btn ${libFilter==='studied'?'active':''}" data-f="studied">Studied</button>
      <button class="filter-btn ${libFilter==='mastered'?'active':''}" data-f="mastered">Mastered</button>
    </div>
    <div id="libList"></div>
  </div>`;

  const searchEl = el.querySelector('#libSearch');
  const listEl = el.querySelector('#libList');
  const infoEl = el.querySelector('#libInfo');

  function doSearch() {
    const q = searchEl.value.toLowerCase().trim();
    const p = getProgress();
    let results = ALL_WORDS.map((w, i) => ({ ...w, idx: i }));

    if (libFilter === 't1') results = results.filter(w => w.table === 1);
    else if (libFilter === 't2') results = results.filter(w => w.table === 2);
    else if (libFilter === 'new') results = results.filter(w => !p.studied[w.idx] && !p.mastered[w.idx]);
    else if (libFilter === 'studied') results = results.filter(w => p.studied[w.idx]);
    else if (libFilter === 'mastered') results = results.filter(w => p.mastered[w.idx]);

    if (q) results = results.filter(w => w.word.includes(q) || w.pinyin.toLowerCase().includes(q));

    const total = results.length;
    results = results.slice(0, 80);
    infoEl.textContent = q ? `${total} results found` : `Showing ${results.length} of ${total} words`;
    listEl.innerHTML = '';
    results.forEach(w => renderWordCard(w, listEl));
  }

  searchEl.addEventListener('input', doSearch);
  el.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      libFilter = btn.dataset.f;
      el.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      doSearch();
    });
  });
  doSearch();
}

// ═══════════════════════════════════════════════════
//  STATS TAB
// ═══════════════════════════════════════════════════
function renderStats(el) {
  const p = getProgress();
  const studied = Object.keys(p.studied).length;
  const mastered = Object.keys(p.mastered).length;
  const total = ALL_WORDS.length;
  const pctS = total ? (studied / total * 100).toFixed(1) : 0;
  const pctM = total ? (mastered / total * 100).toFixed(1) : 0;
  const wpd = getWordsPerDay();
  const totalDays = getTotalDays();

  function ring(pct, color, size = 100) {
    const r = (size - 8) / 2, c = 2 * Math.PI * r, o = c - (pct / 100) * c;
    return `<svg width="${size}" height="${size}" style="transform:rotate(-90deg)"><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="8"/><circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="8" stroke-dasharray="${c}" stroke-dashoffset="${o}" stroke-linecap="round" style="transition:stroke-dashoffset .8s"/></svg>`;
  }

  const milestones = [
    { t: 100, n: 'First 100 words' }, { t: 500, n: '500 — daily basics' },
    { t: 1000, n: '1,000 — conversations' }, { t: 2500, n: '2,500 — intermediate' },
    { t: 5000, n: '5,000 — advanced' }, { t: TABLE1_COUNT, n: `Table 1 complete (${TABLE1_COUNT})` },
    { t: total, n: `All ${total.toLocaleString()} words!` }
  ];

  el.innerHTML = `<div class="fade-up">
    <h2 style="font-size:17px;font-family:var(--serif);text-align:center;margin-bottom:18px">Your Progress</h2>
    <div class="ring-row">
      <div class="ring-wrap">${ring(pctS, 'var(--yellow)')}<div class="ring-center"><div class="ring-pct" style="color:var(--yellow)">${pctS}%</div></div><div class="ring-label">Studied</div></div>
      <div class="ring-wrap">${ring(pctM, 'var(--green)')}<div class="ring-center"><div class="ring-pct" style="color:var(--green)">${pctM}%</div></div><div class="ring-label">Mastered</div></div>
    </div>
    <div class="stat-grid">
      ${[
        { l: '📚 Total Words', v: total.toLocaleString() },
        { l: '📖 Studied', v: studied.toLocaleString() },
        { l: '⭐ Mastered', v: mastered.toLocaleString() },
        { l: '📅 Current Day', v: getStudyDay() + 1 },
        { l: '⏳ Days Left', v: Math.max(0, totalDays - getStudyDay()) },
        { l: '🎯 Words/Day', v: wpd },
      ].map(s => `<div class="stat-card"><div class="st-label">${s.l}</div><div class="st-val">${s.v}</div></div>`).join('')}
    </div>

    <div class="info-card">
      <div class="section-title">📋 Your 6-Month Plan</div>
      <p><strong>${total.toLocaleString()}</strong> words total: <span class="highlight">${TABLE1_COUNT.toLocaleString()}</span> core (Table 1) + <span class="highlight">${(total - TABLE1_COUNT).toLocaleString()}</span> extended (Table 2)</p>
      <p>At <strong>${wpd} words/day</strong>, you'll finish in <strong class="highlight">${totalDays} days</strong></p>
      <p>Translations in <strong>English 🇬🇧, Soomaali 🇸🇴, Bahasa Indonesia 🇮🇩</strong></p>
    </div>

    <div class="info-card">
      <div class="section-title">🏆 Milestones</div>
      ${milestones.map(m => {
        const pct = Math.min(100, mastered / m.t * 100);
        const done = mastered >= m.t;
        return `<div class="milestone"><div class="m-row"><span class="m-name ${done ? 'done' : ''}">${done ? '✓ ' : ''}${m.n}</span><span class="m-count">${mastered}/${m.t}</span></div><div class="m-bar"><div class="m-fill" style="width:${pct}%;background:${done ? 'var(--green)' : 'var(--accent)'}"></div></div></div>`;
      }).join('')}
    </div>

    <button class="reset-btn" id="resetBtn">Reset All Progress</button>
  </div>`;

  el.querySelector('#resetBtn').addEventListener('click', () => {
    if (confirm('Reset all progress? This cannot be undone!')) {
      saveProgress({ studied: {}, mastered: {}, startDate: today(), wordsPerDay: wpd });
      renderStats(el);
    }
  });
}

    prog.startDate = start;
    saveProgress(prog);
    const status = el.querySelector('#apiStatus');
    status.className = 'api-status ' + (key ? 'api-ok' : 'api-no');
    status.textContent = key ? '✓ Settings saved!' : '✗ No API key';
    updateHeader();
  });

  el.querySelector('#exportBtn').addEventListener('click', () => {
    const data = { progress: getProgress(), settings: getSettings() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'vocab-progress-' + today() + '.json';
    a.click();
  });

  el.querySelector('#importBtn').addEventListener('click', () => {
    el.querySelector('#importFile').click();
  });

  el.querySelector('#importFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = JSON.parse(evt.target.result);
        if (data.progress) saveProgress(data.progress);
        if (data.settings) saveSettings(data.settings);
        alert('Progress imported!');
        renderSettings(el);
      } catch { alert('Invalid file'); }
    };
    reader.readAsText(file);
  });
}
